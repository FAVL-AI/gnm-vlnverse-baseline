<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FleetSafe H1 Robot Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #header {
      background: #161b22;
      border-bottom: 1px solid #21262d;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #header h1 { font-size: 18px; color: #58a6ff; font-weight: 600; }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #3fb950; display: inline-block;
    }
    #status-text { font-size: 12px; color: #8b949e; }
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #viewer-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      position: relative;
    }
    canvas#stick { background: #0d1117; }
    #safety-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(22, 27, 34, 0.9);
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      min-width: 160px;
    }
    .safety-nominal { color: #3fb950; }
    .safety-warning  { color: #e3b341; }
    .safety-emergency { color: #f85149; }
    #sidebar {
      width: 300px;
      background: #161b22;
      border-left: 1px solid #21262d;
      overflow-y: auto;
      padding: 12px;
    }
    #sidebar h2 {
      font-size: 13px;
      color: #58a6ff;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .joint-row {
      margin-bottom: 6px;
    }
    .joint-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #8b949e;
      margin-bottom: 2px;
    }
    .joint-label span { color: #c9d1d9; }
    .bar-bg {
      height: 6px;
      background: #21262d;
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fg {
      height: 100%;
      background: #58a6ff;
      border-radius: 3px;
      transition: width 60ms linear;
      min-width: 2px;
    }
    .section-title {
      font-size: 11px;
      color: #8b949e;
      margin: 12px 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #fleet-table {
      width: 100%;
      font-size: 11px;
      border-collapse: collapse;
    }
    #fleet-table td { padding: 2px 4px; }
    #fleet-table tr:hover { background: #21262d; }
  </style>
</head>
<body>

<div id="header">
  <span id="status-dot"></span>
  <h1>FleetSafe H1 Robot Viewer</h1>
  <span id="status-text">Connecting...</span>
</div>

<div id="main">
  <div id="viewer-panel">
    <canvas id="stick" width="700" height="520"></canvas>

    <div id="safety-overlay">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px;color:#58a6ff">Safety</div>
      <div>State: <span id="safety-state" class="safety-nominal">NOMINAL</span></div>
      <div>Tilt: <span id="safety-tilt">0.00</span> rad</div>
      <div>Height: <span id="safety-height">1.00</span> m</div>
      <div>CBF h_min: <span id="safety-hmin">--</span></div>
      <div style="margin-top:6px;font-size:10px;color:#8b949e">
        Source: <span id="data-source">--</span>
      </div>
    </div>
  </div>

  <div id="sidebar">
    <h2>Joint States</h2>
    <div id="joints-container"></div>

    <div class="section-title">Fleet Status</div>
    <table id="fleet-table">
      <tr><td>Risk Level</td><td id="fleet-risk">--</td></tr>
      <tr><td>Robots (nominal)</td><td id="fleet-nominal">--</td></tr>
      <tr><td>Fleet Score</td><td id="fleet-score">--</td></tr>
    </table>

    <div class="section-title">Robot Info</div>
    <div id="robot-info" style="font-size:11px;color:#8b949e;"></div>
  </div>
</div>

<script src="/static/viewer.js"></script>
<script>
// ─── Joint definitions ───────────────────────────────────────────────────────
const JOINTS = [
  {name:'left_hip_yaw',   lo:-0.785, hi:0.785},
  {name:'left_hip_roll',  lo:-0.523, hi:0.523},
  {name:'left_hip_pitch', lo:-1.57,  hi:1.57},
  {name:'left_knee',      lo:-0.087, hi:2.443},
  {name:'left_ankle',     lo:-0.785, hi:0.785},
  {name:'right_hip_yaw',   lo:-0.785, hi:0.785},
  {name:'right_hip_roll',  lo:-0.523, hi:0.523},
  {name:'right_hip_pitch', lo:-1.57,  hi:1.57},
  {name:'right_knee',      lo:-0.087, hi:2.443},
  {name:'right_ankle',     lo:-0.785, hi:0.785},
  {name:'left_shoulder_pitch', lo:-3.14, hi:3.14},
  {name:'left_shoulder_roll',  lo:-1.57, hi:1.57},
  {name:'left_elbow',          lo:-1.57, hi:1.57},
  {name:'left_wrist',          lo:-1.57, hi:1.57},
  {name:'right_shoulder_pitch',lo:-3.14, hi:3.14},
  {name:'right_shoulder_roll', lo:-1.57, hi:1.57},
  {name:'right_elbow',         lo:-1.57, hi:1.57},
  {name:'right_wrist',         lo:-1.57, hi:1.57},
];

// ─── Build joint bar UI ──────────────────────────────────────────────────────
const container = document.getElementById('joints-container');
const barEls = [];
JOINTS.forEach((j, i) => {
  const row = document.createElement('div');
  row.className = 'joint-row';
  row.innerHTML = `
    <div class="joint-label">
      <span>${j.name}</span>
      <span id="jv-${i}">0.000</span>
    </div>
    <div class="bar-bg"><div class="bar-fg" id="jb-${i}" style="width:50%"></div></div>`;
  container.appendChild(row);
  barEls.push({
    bar: document.getElementById(`jb-${i}`),
    val: document.getElementById(`jv-${i}`),
  });
});

function updateJoints(positions) {
  positions.forEach((pos, i) => {
    if (i >= JOINTS.length) return;
    const j = JOINTS[i];
    const pct = ((pos - j.lo) / (j.hi - j.lo)) * 100;
    barEls[i].bar.style.width = Math.max(2, Math.min(100, pct)) + '%';
    barEls[i].val.textContent = pos.toFixed(3);
  });
}

// ─── Stick figure canvas ─────────────────────────────────────────────────────
const canvas = document.getElementById('stick');
const ctx = canvas.getContext('2d');
const CX = canvas.width / 2;
const CY = canvas.height * 0.42;
const SCALE = 150;

function drawRobot(pos) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ground
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, canvas.height * 0.88);
  ctx.lineTo(canvas.width, canvas.height * 0.88);
  ctx.stroke();

  const hipY = CY;

  // Torso
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(CX, hipY);
  ctx.lineTo(CX, hipY - SCALE * 0.5);
  ctx.stroke();

  // Head
  ctx.beginPath();
  ctx.arc(CX, hipY - SCALE * 0.5 - 20, 20, 0, 2 * Math.PI);
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Legs
  const legColors = ['#f85149', '#3fb950'];
  [0, 1].forEach(side => {
    const sign = side === 0 ? -1 : 1;
    const base = side === 0 ? 0 : 5;
    const hipPitch = pos[base + 2] || -0.4;
    const knee = pos[base + 3] || 0.8;
    const thigh = SCALE * 0.42;
    const shank = SCALE * 0.42;
    const hx = CX + sign * SCALE * 0.09;
    const hy = hipY;
    const kx = hx + thigh * Math.sin(hipPitch);
    const ky = hy + thigh * Math.cos(hipPitch);
    const kneeTotal = hipPitch + knee;
    const fx = kx + shank * Math.sin(kneeTotal);
    const fy = ky + shank * Math.cos(kneeTotal);

    ctx.strokeStyle = legColors[side];
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.lineTo(kx, ky);
    ctx.stroke();
    ctx.strokeStyle = legColors[side] + 'aa';
    ctx.beginPath();
    ctx.moveTo(kx, ky);
    ctx.lineTo(fx, fy);
    ctx.stroke();

    // Foot
    ctx.strokeStyle = legColors[side];
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(fx + sign * 20, fy);
    ctx.stroke();
  });

  // Arms
  const armColors = ['#e3b341', '#79c0ff'];
  [0, 1].forEach(side => {
    const sign = side === 0 ? -1 : 1;
    const base = 10 + side * 4;
    const pitch = pos[base] || 0;
    const sx = CX + sign * SCALE * 0.2;
    const sy = hipY - SCALE * 0.42;
    const upper = SCALE * 0.28;
    const lower = SCALE * 0.25;
    const elbowX = sx + upper * Math.sin(pitch) * sign;
    const elbowY = sy + upper * Math.cos(pitch);
    const elbow = pos[base + 2] || 0;
    const handX = elbowX + lower * Math.sin(pitch + elbow) * sign;
    const handY = elbowY + lower * Math.cos(pitch + elbow);

    ctx.strokeStyle = armColors[side];
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(elbowX, elbowY);
    ctx.lineTo(handX, handY);
    ctx.stroke();
  });

  // Labels
  ctx.fillStyle = '#8b949e';
  ctx.font = '11px monospace';
  ctx.fillText('FleetSafe H1 — Sagittal View', 10, 18);
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
let retries = 0;
function connectWS() {
  const ws = new WebSocket(`ws://${location.host}/ws/joint_states`);
  ws.onopen = () => {
    document.getElementById('status-dot').style.background = '#3fb950';
    document.getElementById('status-text').textContent = 'Live — 50 Hz';
    retries = 0;
  };
  ws.onmessage = evt => {
    const state = JSON.parse(evt.data);
    if (state.positions) {
      updateJoints(state.positions);
      drawRobot(state.positions);
      document.getElementById('data-source').textContent = state.source || '?';
    }
  };
  ws.onerror = () => {
    document.getElementById('status-dot').style.background = '#f85149';
  };
  ws.onclose = () => {
    retries++;
    document.getElementById('status-text').textContent = `Retry ${retries}...`;
    setTimeout(connectWS, 2000);
  };
}

// ─── API polling ──────────────────────────────────────────────────────────────
async function pollSafety() {
  try {
    const r = await fetch('/api/safety/status');
    const d = await r.json();
    const el = document.getElementById('safety-state');
    el.textContent = d.state;
    el.className = d.is_safe ? 'safety-nominal' : 'safety-emergency';
    document.getElementById('safety-tilt').textContent = (d.base_tilt_rad || 0).toFixed(3);
    document.getElementById('safety-height').textContent = (d.base_height_m || 0).toFixed(2);
    if (d.h_min !== undefined) {
      document.getElementById('safety-hmin').textContent = d.h_min.toFixed(3);
    }
  } catch(e) {}
}

async function pollFleet() {
  try {
    const r = await fetch('/api/fleet/status');
    const d = await r.json();
    document.getElementById('fleet-risk').textContent = d.fleet_risk_level;
    document.getElementById('fleet-nominal').textContent = `${d.n_nominal}/${d.n_robots}`;
    document.getElementById('fleet-score').textContent = (d.fleet_risk_score || 0).toFixed(3);
  } catch(e) {}
}

async function pollRobotInfo() {
  try {
    const r = await fetch('/api/robot/info');
    const d = await r.json();
    document.getElementById('robot-info').innerHTML = `
      Name: ${d.name}<br>
      DOF: ${d.dof}<br>
      Mass: ${d.mass_kg} kg<br>
      ROS2: ${d.ros2_connected ? 'yes' : 'no'}
    `;
  } catch(e) {}
}

// ─── Init ─────────────────────────────────────────────────────────────────────
const defaultPos = [0,0,-0.4,0.8,-0.4, 0,0,-0.4,0.8,-0.4, 0,0,0,0, 0,0,0,0];
drawRobot(defaultPos);
updateJoints(defaultPos);
connectWS();
pollSafety();
pollFleet();
pollRobotInfo();
setInterval(pollSafety, 1000);
setInterval(pollFleet, 3000);
</script>
</body>
</html>
