name: GNM-VLNVerse Baseline — Tests

on:
  push:
    branches: [main, "review/**", "feature/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gnm-tests:
    name: "GNM pipeline tests (no GPU)"
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          pip install numpy>=1.26 scipy>=1.12 Pillow>=10.0 pyyaml>=6.0
          pip install pytest>=7.4 pytest-asyncio>=0.23

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Run GNM pipeline tests
        run: |
          python -m pytest tests/gnm -q --tb=short

      - name: Run dry-run commands
        run: |
          python scripts/gnm/manual_testdrive.py --dry-run
          python scripts/gnm/replay_manual_testdrive.py --dry-run
          python scripts/gnm/convert_manual_testdrive_to_gnm.py --dry-run
          python scripts/gnm/replay_gnm_demo.py --list-scenes

      - name: Source-code clean check
        run: |
          git ls-files | grep -E \
            '(^simulations/|^topomaps/|^recordings/|\.jpg$|\.jpeg$|\.png$|\.mp4$|\.pt$|\.pth$|\.ckpt$)' \
            && echo "FAIL: binary/generated files tracked" && exit 1 \
            || echo "OK: repo is source-code clean"

  metric-provenance:
    name: "Track A metric-provenance pack"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-provenance-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: pip install numpy>=1.26 scipy>=1.12

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: "[1/7] Generate all-methods per-episode provenance"
        run: python scripts/gnm/generate_all_methods_provenance.py

      - name: "[2/7] Verify baseline provenance"
        run: python scripts/gnm/verify_tracka_metric_provenance.py

      - name: "[3/7] Verify all-methods provenance"
        run: python scripts/gnm/verify_tracka_all_methods_metric_provenance.py

      - name: "[4/7] Per-scene breakdown"
        run: python scripts/gnm/compute_tracka_per_scene_breakdown.py

      - name: "[5/7] Paired comparison and bootstrap seed stability"
        run: python scripts/gnm/compute_tracka_paired_comparison.py

      - name: "[6/7] Robustness summary"
        run: python scripts/gnm/compute_tracka_robustness_summary.py

      - name: "[7/9] Generate expanded 253-episode provenance (baseline + oracle)"
        run: python scripts/gnm/generate_expanded_tracka_provenance.py

      - name: "[8/9] Verify expanded provenance"
        run: python scripts/gnm/verify_expanded_tracka_provenance.py

      - name: "[9/9] Check research claim gates"
        run: python scripts/gnm/check_research_claim_gates.py

  paper-pdf:
    name: "ICRA paper PDF build"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live (minimal)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-recommended \
            texlive-latex-extra texlive-science texlive-fonts-recommended

      - name: Build paper PDF (two passes)
        working-directory: paper/icra_metric_provenance_stopping
        run: |
          pdflatex -interaction=nonstopmode main.tex
          pdflatex -interaction=nonstopmode main.tex

      - name: Verify PDF was produced
        run: |
          test -f paper/icra_metric_provenance_stopping/main.pdf \
            && echo "OK: main.pdf produced ($(wc -c < paper/icra_metric_provenance_stopping/main.pdf) bytes)" \
            || (echo "FAIL: main.pdf not found" && exit 1)

  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ruff>=0.4
      - run: ruff check scripts/gnm/ tests/gnm/ --select E,F,I --ignore E501 || true
