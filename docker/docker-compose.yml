version: "3.9"

# Fleet-Safe-VLA-OS Docker Compose
# Profiles: isaaclab, ros2-gazebo, mujoco, web
#
# Usage:
#   # MuJoCo smoke test (no GPU)
#   docker compose --profile mujoco up
#
#   # Web viewer
#   docker compose --profile web up
#
#   # ROS2 + Gazebo
#   docker compose --profile ros2-gazebo up
#
#   # Isaac Lab training (GPU required)
#   docker compose --profile isaaclab up

x-common-env: &common-env
  PYTHONPATH: /workspace
  PYTHONUNBUFFERED: "1"

x-repo-mount: &repo-mount
  - type: bind
    source: ..
    target: /workspace

services:
  # ── Isaac Lab Training ────────────────────────────────────────────────────
  isaaclab:
    profiles: [isaaclab]
    build:
      context: ..
      dockerfile: docker/Dockerfile.isaaclab
    image: fleet-safe-vla-os:isaaclab
    container_name: fleet_safe_isaaclab
    runtime: nvidia
    environment:
      <<: *common-env
      OMNI_KIT_ACCEPT_EULA: Y
      DISPLAY: ${DISPLAY:-:0}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      *repo-mount
    network_mode: host
    command: >
      bash scripts/isaaclab/train.sh
      task=FleetSafe-H1-RoughLocomotion-v0
      num_envs=4096
      headless=true
    shm_size: "8gb"
    ulimits:
      memlock: -1
      stack: 67108864

  # ── ROS2 + Gazebo ─────────────────────────────────────────────────────────
  ros2-gazebo:
    profiles: [ros2-gazebo]
    build:
      context: ..
      dockerfile: docker/Dockerfile.ros2
    image: fleet-safe-vla-os:ros2
    container_name: fleet_safe_ros2
    environment:
      <<: *common-env
      ROS_DOMAIN_ID: "0"
      DISPLAY: ${DISPLAY:-:0}
    volumes:
      *repo-mount
    network_mode: host
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        cd /workspace/ros2_ws &&
        colcon build --symlink-install &&
        source install/setup.bash &&
        ros2 launch fleet_safe_bringup h1_gazebo.launch.py headless:=true
      "
    device_cgroup_rules:
      - "c 189:* rmw"
    volumes:
      - *repo-mount
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

  # ── MuJoCo Smoke Test ─────────────────────────────────────────────────────
  mujoco:
    profiles: [mujoco]
    build:
      context: ..
      dockerfile: docker/Dockerfile.mujoco
    image: fleet-safe-vla-os:mujoco
    container_name: fleet_safe_mujoco
    environment:
      <<: *common-env
      MUJOCO_GL: osmesa  # Software rendering, no GPU needed
    volumes:
      *repo-mount
    command: bash scripts/mujoco/smoke_test.sh

  # ── Web Viewer ─────────────────────────────────────────────────────────────
  web:
    profiles: [web]
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    image: fleet-safe-vla-os:web
    container_name: fleet_safe_web
    environment:
      <<: *common-env
    volumes:
      *repo-mount
    ports:
      - "8080:8080"
    command: python web/robot_web_viewer/app.py --host 0.0.0.0 --port 8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/robot/info"]
      interval: 10s
      timeout: 5s
      retries: 3
